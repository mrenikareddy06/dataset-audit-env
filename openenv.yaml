version: "1.0"
name: dataset-audit-env
description: "OpenEnv-compliant RL environment for data quality auditing."
entry_point: inference.py
tags:
  - openenv
  - rl-environment
server:
  build:
    context: .
    dockerfile: Dockerfile
  port: 8000
  endpoints:
    reset: /reset
    step: /step
    state: /state
tasks:
  - id: "easy"
    description: "Identify all missing values in the dataset."
  - id: "medium"
    description: "Identify type errors and duplicates in the dataset."
  - id: "hard"
    description: "Perform a full audit and provide fix suggestions."
